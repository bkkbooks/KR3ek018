body:
  text: 囑言夫人之一身血脈貫通似河海周流而無絲毫阻滯設一旦有邪毒竄入五臟六腑或風濕中入皮膚肌腠之間便血脈不行而患斯作矣但毒之所發變應萬千有中於臟者有中於腑者有中於陽分陰分氣分血分者種種原因不一而足發於陽者則紅腫高大而痛甚發於陰者則低塌平伏以灰白或則日輕夜重或則晝重夜輕其呈象頗不一致症之初起以草藥愈者有之而久治不效者亦有之遷延日久遂有成繭及不收口之諸般壞象矣吾門在此萬般困難諸醫束手時而有四味異藥十三奇方以濟之此種困難遂迎刃而解醫盡世間奇症從未輕授外人得之者可坐獲厚利救濟群生此中至藥雖南面王不易也吾子孫當世代遵守是所至囑又據黃承昊折肱漫録第七卷腫毒條有云凡患毒者多服十三方及仙方活命飲以敗毒但老弱之人不能堪此故薛立齋以托裡敗毒散易之又醫藥編有云一人患瘧久不愈以金蚣丸投之瘧止云云黃氏為明季萬曆丙辰進士折肱漫録成於崇禎乙亥是外科十三方之來當不始自清代矣上編總論歌儂等著論總提綱陰陽內外悉分張癰疽發處分赤白瘡癤起時別暗光滿腹仁恩留赤子一腔慈愛著青囊百骸中毒分表裡三關直透識陰陽回生妙術傳釜水救死奇方著蜀疆且看杏林多秀色須知橘井有泉香愚民莫負儂醫惠轉盼乾坤樂更長癰疽總論夫癰疽之症本由心經而發何以發自心經因實火動而成癰疽雖有各症亦當分內因外因不內外因內因者乃心肝脾肺腎及心包絡等處或因寒熱而血凝氣滯或膏粱厚味而遺諸毒外因者乃肩挑背負勞苦奔趨而迎暑濕風邪擾動氣血不和此外因也不內外因者乃五臟受傷而邪毒透入也癰疽之發分筋骨韌皮膚五類癰發於血脈之間屬陽為順症疽發於筋骨之內屬陰為逆症發於皮內者為瘍發於膚上者為癤凡症宜視陰陽詳察善惡若見三善縱然沉重亦無大害如見四惡雖然微小亦必喪亡凡業醫者不可徒從表裡寒熱而辨陰陽以貽害於人也癰疽總論歌癰疽原是火毒生經絡阻隔氣血凝外因六淫八風感內因六欲並七情飲食起居多失慎肩挑背負損其身膏粱之變營衛過藜藿之軀氣血貧疽由筋骨陰分發癰從陽分肉脈生瘍起皮里肉之外瘡發皮膚為失榮陽盛焮腫赤痛易陰盛色暗陷不疼半陰半陽不高腫微痛微熱紅亦輕五善為順七惡逆見三見四可分明臨症色脈須詳察溫涼補汗攻應分善治傷寒雜症易能察癰疽腫毒精癰疽總論歌解經云諸痛癢瘡皆屬心火故曰癰疽原是火毒生也癰疽皆因營衛不和氣血凝結經絡阻隔而生故曰經絡阻隔氣血凝也其因有三內因外因不內外因是也外因者由於春之風夏之暑濕秋之燥冬之寒也當其時而至則為正氣非其時而至或過盛則為淫邪凡此六淫為病皆屬外因亦有因八風相感如冬至日正北大剛風春分日正東嬰兒風秋分日正西罡風立夏日東南弱風立冬日西北折風應時而至則生養萬物不應時而至則殺害生靈萬物若人感受則內生重病外發癰疽凡此八風為病皆屬於外故亦曰外因六淫八風感也內因者耳聽淫聲目視邪色鼻聞過臭舌食滋味心思過度意念妄生皆損人神凡此六淫為病皆屬內因故曰內因六欲並七情也不內外因者飲食不節起居不慎過飲醇酒則生火消爍陰液過飲茶水則生濕過食五辛則損氣血過飢過飽則傷脾胃凡此種種皆飲食之致病晝夜過勞擔輕負重跌撲損墜等類損其身形夜不靜息強力入房勞傷精氣此起居之病也其起於膏粱厚味者多令人營衛不和火毒內結起於藜藿薄食者多令人胃氣不充氣血虧少凡此種種皆不內外因也人之身體計有五層皮脈肉筋骨也發於筋骨間者曰疽屬陰發於血脈間者曰癰屬陽發於皮里肉外者曰瘍毒只發於皮膚上者名曰瘡癤凡癰疽陽盛者初起焮腫色赤疼痛則易潰易斂順而易治以其為陽症也陰盛者初起色黯不紅塌陷不腫木硬不疼則難潰難斂逆而難治以其為陰症也半陰半陽者漫腫不高微痛不甚色不甚紅此症屬險若能隨症施治不失其時則亦可轉險為順否則逆矣五善者五善之症也諸瘡見之則為順則易治七惡者七惡之症也諸瘡見之則為逆則難治凡患癰疽者五善為順七惡為逆如見三善者必生見四惡者必死矣爾後學業醫者當於臨症之際詳察其色宜溫者則溫之宜涼者則涼之宜補則補宜汗則汗宜攻則攻果能如是庶有濟而不誤也然而外症癰疽猶如內症傷寒能善治傷寒者則雜症無不易治能善療癰疽者則諸瘡無不精妙蓋以其能辨表裡陰陽虛實寒熱也癰疽陽症歌陽症初起焮赤痛根束盤清腫如弓七日或疼或時止二七瘡內漸生膿毒隨膿出精神爽腐脫新生氣血充嫩肉如珠顏色美更兼鮮潤若榴紅自然七惡全無犯應當五善喜相逢須知此屬純陽症醫藥調和自有功凡癰疽初起焮熱赤痛根束者暈不散也盤清者不漫腫也如弓者高腫也易潰易斂此為順症詳察細審自易見功癰疽陰症歌陰症初起如粟大不紅不腫疙瘩僵木硬不痛不焮腫瘡根平大黯無光三七之後不潰腐軟陷無膿結空倉瘡上生衣如脫甲孔中結子似菡房紫黑膿稀多臭穢如見七惡定必亡須知此屬純陰症縱有岐黃命不長凡癰疽初起不紅不腫不焮熱狀似粟米疙瘩木硬不痛七朝之後不潰不斂瘡上生衣如脫殼樣口如花結子此屬逆症倘見七惡必定死亡如現五善一二者尚可勉強救治否則徒勞陰陽相半歌陰陽相半屬險症陽吉陰凶生死昭似陽微痛微焮腫如陰半硬半腫高腫而不潰因脾弱潰而不斂為膿磽五善之症雖兼有如現七惡豈全逃飲食若能知味美二便調和尚可療按法醫治應手效陽長陰消自可調半陰半陽皆屬險症似陽不甚燒熱似陰不甚木硬多現順症宜可救如現逆症則難療如陰升陽泄者縱然多險尚有一線生機癰疽善惡歌法則無他審症先陰陽兩症必須參五善七惡休咎定明哲先當仔細觀夫病分內外審症宜詳病由臟腑經絡而發癰疽亦自臟腑而成內症必先察其表裡外症亦當審其陰陽審症既確施治自易癰疽陽症之形發為紅腫大燒大熱頭尖色赤病者時畏寒熱口乾發渴不思飲食只喜茶水此陽症也陰症色青不燒不熱不紅不腫患者飲食不多精神猶暢此陰症也又有陰症似陽者患部先紅而猶赤時燒時退或有或無疼痛不堪口中焦渴人多眩暈此陽症兼陰也如患者周身寒冷泚汗淋漓瘡頭豐滿色多黑赤頭尖體圓此陰症兼陽也欲治外症無他妙法當先辨其陰陽次當詳其五善七惡五善者一聲音洪亮二精神舒展三瘡形陽症紅紫陰症赤白四飲食無減五靜睡不煩此善症也若得一二善者所患雖重亦自無虞七惡者一聲音沉滯二坐臥難安三頭多眩悶四陽帶黑赤陰帶紅紫五瘀血時流六周身寒冷七人多恍惚此七惡見其一二者皆不可救藥業此者審察宜詳不可疏忽大意癰疽五善歌心善精神爽言清色潤鮮不躁不煩渴寤寐兩相安肝善身輕便不怒不驚煩指甲紅潤色起坐覺安然脾善唇滋潤知味喜加餐膿黃不臭穢大便不稀干肺善聲音響不喘無嗽痰皮膚光潤澤呼吸氣相安腎善不午熱口和齒不幹小溲清且白夜臥靜如山癰疽七惡歌一惡神昏憒心煩舌燥干瘡色多紫黑言語見呢喃二惡身筋強目睛正視難瘡頭流血水驚悸是傷肝三惡形消瘦瘡形陷又堅膿清多臭穢脾敗食不甘四惡皮膚稿痰多韻不圓喘生鼻頻扇肺絶定歸泉五惡時引飲咽喉若燎煙腎亡容慘黑囊縮死之原六惡身浮腫腸鳴嘔厄繁大腸多滑泄臟腑敗之端七惡瘡倒陷如剝蟺一般時時流汙水四肢厥逆寒諸般壞症歌初起如粟癢微生未老頭白痛漸增一日寒熱發戰起三四發泡硬如疔晝夜昏沉癢不止四紅五紫六日青人若犯此無膿症十人之中九不生中編處方篇十三方中最神祕而令人難索解者厥為首方中之中九丸十人十樣使人莫名所以尤以三打靈藥為特甚銀翠次之金丹石青則所差尚屬無多今特先將四味異藥之製法詳述於前以中九丸配合法殿之於後然後再及其他之十二靈方以成其全鍋烈製法即三打靈藥處方水銀一兩白礬一兩微煆去水分火硝一兩焙去水分食鹽一兩焙乾硃砂五錢皂礬一兩製法先將白礬火硝食鹽皂礬硃砂共研極細再加水銀又研直研至不見水銀星珠時為止分作三份備用以一份堆於小鐵鍋內上以大碗覆之隨以醋調熟石膏粉將碗同鍋連接處塗封嚴密勿使泄氣以炒乾黃土即黃土之炒去濕氣者用赤石脂更好或極細河砂將碗掩住但須露出碗底並以鐵圈重物套壓碗底不使移動碗底置浸濕棉花一團外以大鐵釘三隻或用火盆上燉食物的鐵三腳架更妙插於地面土中將鍋安置釘上約離地高七指許以微火烤胎焚香計之俟一炷香盡再以文火升煉俟第二炷香盡時又以武火即烈火以焰離鍋底約二指許為度升煉俟三炷香盡時察看碗底棉花是否由濕而干更由干而成黃黑色如已成黃黑色即離火待冷將已冷丹鍋輕輕除去黃土石膏揭開丹碗靈藥即升碗上色白者嫩色紫者老色紅者恰到好處是上品如碗上有水銀星珠是武火用早水銀首先飛上不可使用此為一轉又名一打取第二份藥末同一轉掃下丹藥調勻合為一處如前升煉三炷香冷定取藥是為二轉靈藥取第三份藥末同二轉靈藥調勻合為一處如前升煉三炷香冷定取藥是為三轉三轉已畢所得之藥即為三打靈藥亦名鍋烈藥經三打則水銀之本性死絶服食遂無流弊丹底可搽諸瘡功能止癢定痛長肉生肌不可棄去金丹製法亦名鍋丹處方倭鉛三錢漳丹二兩製法將鉛放入傾銀罐內即耐火黏土罐昔日熔銀時常用此罐置於火上熔化之將漳丹徐徐撒於已熔鉛上藉重鉛氣熏蒸並於黃丹中間攪一凹處俟蒸至凹處發現黑色四周兼現黃色時是即合度之證大約一炷香時即可蒸透冷定去鉛取丹是即金丹亦名鍋丹石青製法處方白砒二兩硫黃四兩製法將砒硫共研細末投入傾銀罐內上覆鐵板一塊以鐵絲縛緊再用鹽泥將罐全體封固或以醋調石膏亦可俟干聽用將已干丹罐放木炭火中燒之揣度罐中藥已熔化約香三炷乃取出待冷剝除泥殼揭去鐵板手勢應輕勿使蓋上所升之藥落下升於蓋上而色如黃芽者為煙硫沉於罐底而色帶暗緑者為石青將此暗緑色物取出研細備用二物雖然同出一本性卻截然不同蓋煙硫有毒而石青無毒也銀翠製法處方紋銀一兩石青約一兩製法將銀打成薄片剪成小塊投入傾銀罐內火上熔化取石青末約六七錢投入已熔銀上以鐵箸攪拌銀即自然起發如不十分起發時可再投石青末三四錢必能起發所用石青不拘多少總以銀質發透為率將發透之銀取出打碎研為細末飛去灰渣其色與靛花相似翠色故名銀翠將其浸入冷水每日換水二次七日夜後火毒即盡收貯備用顧世澄瘍醫大全痔漏門中有退管方一個絶類銀翠僅制度不同特録於後以資參證甲磁石六兩打如豆大用白芨水浸數日取出以硫黃粉為衣入罐升三小時得丹約三錢乙辰砂四兩明礬四兩另入罐升成丹丙紋銀一兩硫黃三錢白砒三分煉化成粉將以上三種藥末各稱等分研勻米糊為丸如粟米大每服一分白芷湯下服後約半日間下部即覺脹痛用手拍左右臀管即自出俟出盡時以生肌藥收功管口小者先以爛藥爛開管即易出欲管速出者可再用萆麻子煎水洗之附靈藥釋性鍋烈辛平無毒功能去濕殺蟲活血解毒化痰解鬱金丹辛平無毒功能治吐逆反胃墜痰殺蟲銀翠辛平無毒合藥能治一切奇瘡怪症內服功能斂口生肌石青大熱因其有砒故能解水銀輕粉之毒善治一切風濕筋骨作痛作腫又能解一切寒涼藥毒及瘡不收口作寒作熱等更能領導水銀輕粉循行筋脈以解周身痰氣乃諸藥中之極熱者不可不用亦不可多用楊鵬先經驗救急方乾坤奪命丹生白信石一兩研末生硫黃一兩研末白蠟一兩三宗標準不可缺少分量將蠟熔化即下二藥合勻出鍋為丸每丸四分備用此藥治男婦一切氣寒食寒陰寒及婦人白帶男子腎寒白痢瀉下等一切下部寒涼之症並皆治之如男婦陰寒病在危急速服此藥待至二十分鐘時無不立刻回生每服一丸小兒半丸開水送服煙硫其性好走善入肌膚為祛風邪療諸癬之要藥但有大毒故只可外用不可內服第一方中九丸歌曰中九丸來味不多説破異藥笑哈哈任他諸般奇怪症每服數丸起沉疴處方鍋烈一錢金丹一錢銀翠三錢若膿寒加石青五分製法共研細末用麵糊趁熱合藥為丸如鳳仙子大備用用法每服一分病重者可由二分加至三分用溫酒或溫開水送服服至毒消盡時為止忌食蘿蔔如糸陰症可加石青一錢餘症不用畏寒者可加百草霜五錢疔瘡忌服小孩量減服丸之後間有發現頭暈者不必畏懼過一時即消失矣中九丸的又一配合法處方鍋烈六錢金丹三錢石青四錢銀翠四錢蟾酥二錢熊膽三錢珍珠二錢麝香一錢製法以棗泥為丸如小黑豆大硃砂為衣用法每服二三丸用龍眼肉包好白糖開水送服每日二次病重者可服三四丸血燥之人可加牛黃如無牛黃可用九轉膽星代之第二方金蚣丸歌曰金蚣丸內用蜈蚣全蠍山甲與僵蟲硃砂雄黃同配合痰核瘰癧散無蹤處方金頭蜈蚣十五條去頭足微炒全蠍二十個去頭足米泔水洗山甲二十片土炒成珠殭蠶二十條炒去絲硃砂二錢明雄二錢川軍三錢製法共研細末黃酒曲糊為丸如緑豆大硃砂雄黃為衣用法每服三十至五十粒空心溫黃酒送服老弱量服汗出即愈未成者消已成膿者次日即潰已潰者忌服如系痰核瘰癧可兼服中九丸五至十粒以輔助之又如患者體質柔弱消化不良服中九丸後腹痛作瀉者可兼服此丸即可減退其副作用又古方五虎下西川即金蚣丸之多蟬蛻者但據我收藏的十三方抄本中亦有三本方中有蟬蛻可知本方是從五虎下西川蛻化出來的一個驗方原方如次金頭蜈蚣一條去頭足糯米炒黃色全蠍五錢洗去鹽焙乾蟬蛻五錢去頭足穿山甲五錢陳土炒殭蠶五錢炒去絲共研細末苕面為丸如緑豆大硃砂為衣壯者每服二十丸弱者十丸土苓湯下忌油葷及一切發物凡一切楊梅毒瘡魚口橫痃不問已潰未潰皆可治之無不驗者又錢塘趙恕軒串雅編及種福堂公選良方中之鱗鯉丸皆與金蚣丸方十九相同且較金蚣丸完善而穩妥據趙氏云即鈴醫之八面鋒為一切無名腫毒之特效專藥而於瘰癧一症尤具特長故編者每於用金蚣丸處皆易以此方不僅效力確實而且更少流弊今録其方於次歸尾五錢生軍三錢蟬蛻二十隻去頭足乳香一錢沒藥一錢制芩三錢全蠍二錢連翹三錢去心防風二錢五分羌活二錢五分雄黃水飛七分殭蠶二十五條薑汁炒牛膠一兩土炒荊芥二錢桔梗二錢金頭蜈蚣四條去頭足分作四種製法一條用薑汁搽焙乾一條用香油搽焙乾一條用濃醋搽焙乾一條用酥搽焙乾上制後共合一處研細末備用再以山甲四兩亦分作四種製法一兩用紅花五錢煎湯煮焙乾一兩用牙皂五錢煎湯煮焙乾一兩用紫草五錢煎湯煮焙乾一兩用蘇木五錢煎湯煮焙乾上制後亦混合一處研末備用將上面各種藥末共合一處以米醋打糊為丸外以硃砂五線為衣每丸重一錢二分瓷瓶收貯以麝香五分養之服時以一丸熱酒送服未成者內消已成者出膿神效非常金蚣丸藥味即此方之一部分與蟾酥丸處方亦小異大同其為外科之重要方可想而知且此方之前數味乃神授衛生湯藥味功能宣熱散風行瘀活血解毒消腫故為外科門中之首要方且較金蚣丸尤為周到而踏實編者每於用金蚣丸處皆易以此方者亦以其周到而踏實也吾蜀梁山楊旭東蜀中醫纂有驪龍珠一方為癰疽總方專治一切癰疽腫毒不論已潰未潰俱能散毒收口生肌長肉方名之下標明為內庭方亦即鱗鯉丸金蚣丸之小有不同者惟方中蜈蚣系二十一條將山甲蜈蚣制好後每以山甲末一兩蜈蚣末二錢配入群藥之中每丸重一錢五分全蠍又系用荷葉包炮之此小異耳欲知其詳可覆按原書又趙氏串雅編中之八釐金主治癰疽發背疔腫瘡毒未成者服之內消甚效察其處方藥味殆亦金蚣丸之加味故並録於此以作他山之助番木鱉水浸去皮油煠枯五錢蟾酥二錢殭蠶二錢乳香二錢沒藥二錢膽礬一錢蜈蚣三錢山甲一錢血竭一錢硃砂三錢蟬蛻一錢川烏一錢雄黃一兩麝香五分上共研末於五月五日修合水泛為丸如萊蔔子大上部病飽服下部病飢服每以八釐陳酒送下小兒酌減他如趙氏之十寶丹串雅補之回生丹青囊祕授之全生丹外科大成之六軍丸蓬萊山樵輯方之觀音救苦丹等皆與金蚣丸如出一轍原書俱在未遑盡録蜈蚣山甲等對腺結核有療效自宜重用且此方功能鎮靜神經如加入麝香更可治療小兒驚風抽搐第三方三香丸歌曰丁木茴香三香丸砂仁紫蘇黃芩兼白朮茯苓陳皮草乾薑澤瀉香附全豬苓木通同草果天花粉末麵糊丸一切寒涼虛危症飲食不進效若仙處方丁香二錢木香三錢小茴七錢砂仁五錢紫蘇七錢黃芩一錢茯苓三錢豬苓一錢白朮三錢陳皮三錢乾薑一錢澤瀉一錢香附二錢木通一錢草果五個花粉三錢製法共為細末麵糊為丸緑豆大用法每服三錢空心薑湯下如患者氣體虛弱飲食少思服中九丸後有嘔吐腹痛之副作用者速服此丸三錢即解此方專治一切冷痰危症甚效若患者體質虛弱胃納不旺服中九丸後發生噁心嘔吐頭眩腹痛及泄瀉者可加此丸三錢同服即可免除乖象此方藥味殊嫌龐雜與木香流氣飲略有出入倘因服中九丸後發生嘔吐者亦可用炒山梔及白蔻加入香砂六君子湯中服之效力亦與本方之作用相等第四方化肉膏歌曰化肉靈膏妙無窮桑麻石灰一樣同二烏靈仙同煎水淋漓入鍋看雌雄五灰雖然同此用加減較彼有神功處方桑枝灰五升麻梗灰五升廣石灰五升未發者製法共合一處備用另以威靈仙一兩川烏四兩草烏一兩野芋頭一兩生半夏一兩巴豆五錢共為咀片煎成濃汁將前灰放在竹箕內先用稻草墊底繼將藥汁淋於灰上濾下之水用器接收濾得之水以沾於舌上如針刺者為佳約一大碗入鍋慢火煎之俟濃縮到相當程度時再加白礬一兩收膏貯瓶黃蠟封口備用用法用時將藥取出研細如泥挑置少許塗於瘡之中央其藥力自能散布四周以奏化腐消毒之功如覺疼痛可揭開檢視如患部四邊有紅線樣物時即噴以冷水一口其痛可立止倘腐爛已去欲生新肌時可將此膏少許用水調如淡茶色用新筆蘸水於瘡上洗之即可逐漸生肌斂口此膏之腐蝕力甚大故使用之後異常疼痛因其作用乃化學上之輕氧化鉀也現今新藥群中頗不乏相同之物如硫酸銅硝酸銀石炭酸等皆具有相同之腐蝕力量如感覺自制麻煩時亦不妨以此類化學品代用赤水元珠有化瘤膏一方即五灰膏其處方雖與本方不盡相同而其作用則完全一致今摘録於此桑木灰棗木灰桐殼灰荍麥灰各二升半共和一處放於已墊稻草之竹箕中淋汁約五碗許入斑蝥四十隻山甲五片乳香五錢冰片一錢用水煎作一碗以瓷器盛之用時以新石灰調膏敷之干則隨以清水潤之化肉膏之作用專在追蝕惡瘡腐肉惟嫌其性質過暴遠不若薛己外科精義之針頭散及仙拈集之脫爛散來得王道故余意不若徑以二方之一以代替之更為圓滿第五方藥線歌曰諸家藥線不相同吾門藥線有奇功雖然砒礬一樣用火候之中看雌雄不論痰核並繭骨化腐乾膿顯神通處方白砒三錢明礬七錢製法上各研細末先於鍋中滴麻油幾滴次將砒末放入再將明礬末蓋於面上將鍋在武火上燒之俟砒礬乾結成餅煙將盡未盡時取出研末以麵糊做成細條如粗絲線備用經此制煉之後砒性已純凡瘰癧成繭及癰疽之久不幹膿等皆可用之外科大成之痔漏退管藥線方中有一方亦僅砒礬二味只制煉方法微有不同亦摘録於此以示此方作用之廣白砒五錢明礬一兩五錢將白砒入鐵鍋內鋪勻上蓋明礬末以火煆之至礬枯時噴冷水一口於砒上隨以棉紙蓋於砒上再隨噴水三五口於紙上從鍋蓋邊紙上看之以有白霜透出時為率如無白霜發現可再煆再噴直至有霜時為止去紙入去油乳沒各少許蓋於礬上離火候冷取出為末以麵糊為條備用用時將此條插入漏孔待管退出時為度如於此方之中再加入蠍尾七枚生草烏末一錢即為最佳之枯痔藥編者枯痔時亦常用之其他外科百效書之點玄丹亦系砒礬二物且云善治惡毒可見此藥線一方專作去腐蝕綿之泛用品蓋頑固腐肉非仗此種大刀闊斧之猛烈峻劑實不能去此冥頑不靈之大患也此線短處是去腐甚痛病者多不樂接受王肖舫氏則以蛤豆條代之化腐不疼且極穩妥其法系以蚊蛤一個焙至焦黃色再取生巴豆三粒去皮心焙研細末加冰片少許共合一處調捻為條以巴豆油質能黏和成條為度否則須相勢加油加藥此條用時爛而不疼功在藥線之上第六方紫霞膏歌曰紫霞膏貼遠年瘡銅緑輕竭乳沒良麻仁松香合一處白蠟清油要相當久頑瘡毒不收口一帖之後效非常處方銅緑五錢血竭五錢乳香五錢沒藥五錢松香一兩萆麻仁一百粒輕粉二錢製法先將前五味共研細末投入石臼中再加萆麻仁輕粉並滴入清油數滴同搗之約二三千杵時即可成膏如不成膏可再加萆麻仁數十粒再搗直搗至臼內膏軟如棉十分融和時為止收貯備用用法此膏善除濕熱拔毒生肌凡夏秋之間感染濕熱發瘡者以此貼之其去腐生肌之功甚捷他如梅毒臁瘡亦有特效近人徐哲臧驗方精華中之紫霞膏較此方小有差別惟其制煉方法則甚可取法故轉録之以作本方參考制松香六兩制乳沒各六錢血竭四錢銅緑二錢潮腦六錢朱磦三兩腰黃八錢麝香八分萆麻仁三兩上十一味除松香萆麻仁外各先後研末備用各藥分量以研末後淨稱為準故在未研之前當各多備若干免致研後不敷合膏時以石臼搗松香使爛次加萆麻仁三加銅緑四加兒茶五加乳香六加沒藥七加血竭八加潮腦九加朱磦十加腰黃末後加入麝香合好之後貯於罐內用紙封固備用上列各藥重量系就一料計算如一次多合則手續較省但松香既多舂搗必難故當事先預約數人工作以便更番輪換務使手不停杵愈熟愈妙搗時如藥嫌干可酌加萆麻仁若干粒以調整之如年久膏硬時亦用此法調整此膏專治癧串未成者自能消散已潰而流膿液者當酌加輕粉犀黃以協助之在攤膏時須隔水燉融切忌直接火烘或在臨用時就熱水壺上溫融之不可採用直接火烘因膏中麝香經火則氣泄而效減也制松香法以松香五斤用鮮芙蓉花連葉十斤以花多者為佳柳條桃葉榴葉各五斤甘草一斤煮成濃湯後去渣濾清留一小部份另儲使冷余盛鍋中安放露天勿置屋內妨爆濺也入松香再煎約松香一桶湯三桶俟油沸盡即陸續用銅勺撈出傾入冷湯中取起每枚捏成如燒餅式中穿一孔以粗麻線貫之分裝布袋緊束袋口浸糞缸中四十九日取出去袋以長流水漂沖三日再露七日夜後埋土中七日存儲備用以二三年者為佳糞缸以無病之童男童女糞為最好年長健壯婦女次之惟忌經帶若男子已成人者則不合用第七方千捶紙歌曰雄黃一錢砒五分撒布紙上摺多層輕輕捶得千餘下貼瘡貼毒有良能休將此方輕相視楊梅疔毒大有靈處方白砒五分明雄一錢製法共為細末取上好皮紙一張將藥末勻布紙上摺為十數折以木捶在紙上捶之約千餘下藥即吸入紙層至轉黃色時為度收藏備用用法若遇楊梅瘡毒腫起者以此紙貼之最佳其他潰後化腐亦妙第八方太歲墨歌曰太歲墨中麝香烈大戟蚊蛤慈菰協千金二烏糯米調內可服來外可貼死牛死馬河肫毒山嵐瘴氣都消得磨搽惡毒能止痛又解砒毒並水厄咽喉腫痛不得眠疔瘡搽上湯潑雪處方山慈菰一兩千金子一兩大戟一兩蚊蛤二兩去蟲麝香一分川烏二兩草烏二兩製法上共為細末以糯米煮糊搗勻用模型鑄為一錢重墨狀條塊陰乾備用舊例甲子年制者型上刻甲子二字乙丑年制者型上刻乙丑二字故有太歲之稱用法每服一錠病重者可連服二錠通利之後用溫粥補之凡疔瘡腫毒口眼歪斜牙關緊急等症俱用溫酒磨服其他一切瘡毒等症皆用醋磨搽功難盡述第九方代針散歌曰未潰之毒可代針巴霜信石各等分淨雄一分相兌用癰毒出膿漸漸輕不問惡毒痰血起陳醋調敷止痛疼處方巴霜一錢信石一錢明雄一錢製法共研細末收瓶備用用法若遇皮薄瘡癤不得穿頭而畏刀針者以陳醋調敷患處約一日間瘡頭即自行穿潰或用黃蠟捻作麥粒大令其兩頭有光每服三粒黃酒沖服見汗之後瘡頭即穿如遇皮厚之瘡須用鈹針刺開少許再敷此藥如未成膿則此藥不可用否則等於活剝龜殼許璉外科證治全書中有咬頭膏方專治癰瘤膿熟不潰作用雖與代針散同其處方則較代針散為王道因其可減低腐蝕中之痛感也故摘附其方如次俾臨床時多一應付法門制乳香制沒藥番木鱉生萆麻仁銅緑各等分共為細末另以不去油巴豆加倍同藥末搗和成膏再加白砒一分搗勻臨用時以緑豆大一粒放患頂上用膏藥掩貼之潰時即行揭下讓膿汁外出惟胎前産後不可貼用第十方熏洗湯歌曰大凡惡毒瘀血成不曾發散致痛疼祕授奇方熏洗法羌獨荊防花木行薄蘇桃槐桑木葉金銀川草顯威靈將藥入鍋同煎水一熏洗後見太平處方銀花三錢羌活獨活川烏草烏防風蒼朮薄荷蘇葉各二錢桑葉桃葉槐葉樟葉各一握製法各藥共同煎水備用用法將煎好藥水乘熱先熏後洗洗後避風功能祛風解毒散結消腫倘再加入黃柏川軍生地更妙未成者熏洗之後將藥渣搗塗患處已成者再加豬蹄湯淋洗化腐生肌之功效無其匹附方如次白芷川芎藿香木香防風甘草各三錢火蔥一握上以米泔水六七碗將藥投入其中入鍋煎濃濾去藥渣不用以新棉蘸湯淋洗患處湯冷再易熱者並隨以手輕擦患處四周令瘡內縮膿隨湯出以盡為度萬潛齋云熏洗有蕩滌之功滌洗則氣血自然舒暢其毒易於潰腐而無壅滯也凡腫在四肢者溻冼之在腰腹脊背者淋之在下部者浴之俱以布帛或棉蘸洗稍涼即易輕者日洗一次重者日夜洗二次每日洗之不可間斷凡洗時冬月要猛火以逼寒氣夏月要閉窗以避涼風若不慎此輕則有妨收口重則恐變純陰夫洗藥不一如初腫與將潰者俱用蔥歸溻腫湯洗如陰症不起者俱用艾茸湯敷法如潰後俱用豬蹄湯燙洗用豬蹄湯者以助肉之氣而逐腐也此洗滌之法乃瘍科之要藥方附於後以備參考一蔥歸溻腫湯凡癰腫瘡瘍初腫將潰之時用此湯洗之以瘡內熱癢為度蔥頭七個當歸獨活白芷甘草各三錢上五味以水三大碗煎至湯醇濾去渣以絹帛蘸湯熱洗如稍涼再易之洗時切忌風寒二艾茸湯敷法凡陰瘡黑陷不痛者皆可用之以知痛則生不知痛而出死血者死並須內服大補回陽之劑以助之方可轉危為安硫黃五錢雄黃五錢艾茸一握上以硫雄二味為末同艾水煎半日水將干取出艾搗爛溫敷患處再煎再易十餘次為度三豬蹄湯凡癰疽諸毒流膿者熬好洗之以助肉氣消腫散風脫腐止痛去惡肉活死肌潤瘡口如腐盡者不必用之當以米泔水熱洗之令瘡潔淨不可過洗過洗則傷水皮膚破爛難生肌肉不易斂口黃芩甘草當歸赤芍白芷蜂房羌活等分上七味共為粗末看證之大小定藥之多少先將豬前蹄一雙用水六碗煮之蹄軟為度將汁濾清吹去汁上油花即用粗藥末一兩投於汁中再用微火煎十數沸濾去渣候湯微溫即以方盤一個於瘡下靠身放定隨用軟絹蘸湯淋洗瘡上併入孔內輕手捺盡內膿使敗腐宿膿隨湯而出以淨為度再以軟帛疊七八重蘸湯勿令太乾覆於瘡上兩手輕按片時帛稍涼再換如此再按四五次可以流通血氣解毒止痛去瘀洗訖用絹帛拭乾即隨症以應用之藥貼之瘡瘍洗法西醫極端推崇惟目的多在清潔殺菌與中醫洗滌之舒暢營衛調和氣血者目的各有不同故中醫洗滌之法實應重視第十一方天然散歌曰天然散內鉛粉神各樣瘡毒可回春畏痛加上輕乳沒止癢銅緑線末靈煆炒鉛粉研極細臨症加減任施行諸般奇症知活用走遍天涯不憂貧處方鉛粉一兩製法於鍋中火炒黃色貯瓶備用用法疼者加輕粉一錢制乳香一錢制沒藥一錢血竭一錢赤石脂煆過一錢冰片一分癢者加銅緑少許以兒茶煎水煮過再煆成黃金色亦可加藥線末三分金箔三帖諸瘡有水者加海螵蛸一錢蚊蛤一錢靈藥五分如諸瘡不收口不紅只癢者加銀翠一錢如欲生肌平口者加龍骨一錢象皮一錢再加煆牡蠣亦佳顧世澄瘍醫大全中有一方專治痔漏發背疔癰臁瘡破流黃水黃水到處浸淫成瘡等症亦即天然散之未加命名者方以杭粉一兩入傾銀罐內化開至成老金黃色冷定研末加冰片三分備用用時將藥撒於患處以手揉之其水自止其痛亦定且不成瘡亦即天然散也又家藏抄本中有錦堂散一方云能去毒生肌收口提膿為外科要藥方繫上錦堂粉即鉛粉錦堂乃其牌名也一兩用銅瓢炒成黃色時以紙包好就水缸下露一宿收貯備用遇症無不立效又一抄本方云膿窩黃水常流搔癢不已漫延不止用之靈效異常方為宮粉即上品鉛粉一兩炒成黑黃色加冰片三分研末搽用亦即天然散之未豫命名者神奇良方中有跌打損傷方一隻亦即天然散之加味者方為豬板油四兩連須蔥一把將油與蔥放石板上以木捶打如泥狀然後以鉛粉四兩入砂鍋內炒至黃色時入油蔥內和成餅狀貼敷傷處即愈一壺天書中有元龍丹方功專生肌斂口方系鉛粉一兩炒黃冰片二錢共研細末乾摻亦天然散之另一名稱者葛洪肘後方墜撲瘀血從高落下瘀血搶心面青氣短欲死者以鉛粉一錢和水服之備急方治陰股常濕以胡粉撲之亦治乾溼癬瘡衛生易簡方接骨續筋止痛活血以定粉一錢當歸一錢硼砂一錢半用蘇木煎湯調下仍頻飲蘇木湯和濟局方及洪氏集驗方皆有此方名神授散洪氏並云曾屢用之甚驗且有詳細説明青囊祕録方折傷接骨以宮粉硼砂等分為末每服一錢蘇木湯下仍頻飲蘇木湯大效與上方同出一轍第十二方麻涼膏歌曰麻涼膏與鐵箍同二烏南半野芋從多用芙蓉葉為主敷上癰疽痛無蹤處方川烏四兩草烏四兩生南星二兩野芋頭四兩芙蓉葉四兩製法共為細末備用用法陽毒用酒調敷陰毒用醋調敷如皮破者以清油調敷如無野芋頭時亦可以水仙花根瓣代之又一用法陰毒可加黃耆肉桂為末醋調敷之此方最適合於陰陽夾雜之症在鮮藥難辦時亦可以南星散代替之方用生南星一兩炒白芥三錢白芷五分共研細末以豬膽汁蜂蜜各半調塗之消腫散結之功不亞於麻涼膏第十三方解毒膏歌曰解毒膏藥味不多不離丹油共粉陀桃槐柳桑發芨蘞木鱉防甲與黃芍堪嘆諸醫多味者幾見膏藥起沉疴處方白芷白蘞白芨川烏草烏黃芩獨活細辛各一錢五分荊芥梔子連翹羌活黃連阿膠海藻山甲昆布大黃木鱉血餘赤芍薄荷牛膝木瓜防風石燕海帶黃柏桃枝柳枝桑枝杉枝天丁密陀僧各一兩水粉四兩炒過黃丹三兩香油八兩製法上為咀片將香油入鍋熬之投前藥除血餘黃丹陀僧鉛粉四味入內熬枯去渣濾過然後下鉛粉先煆過血餘陀僧黃丹至漆黑滴水成珠時停火收入罐內備用用法用時以軟紙攤貼之初因此方屬於師授故常用之後試用別本處方欲對比療效然連試數方均不相上下為了簡化處方乃改用下方更得理想收穫白芨三錢白蘞三錢番木鱉一兩露蜂房三錢蛇蛻錢半山甲三錢鉛粉一兩陀僧一兩桑枝槐枝桃枝各三十寸血餘如雞子大一團馬齒莧五斤煮汁兌入將各藥共合一處用香油一斤同入鍋中炸枯去渣然後加入鉛粉陀僧再熬至滴水成珠時收貯備用此膏勿論何種陽症瘡毒皆可貼用療效極佳有時亦加入大黃赤芍二味下編十八問答一問曰何為腦花答曰腦為諸陽之首乃經絡之總會也花者如蓮房樣或有數孔或有十數孔初起如粟米大微疼微癢三四日間則作熱發疼其毒亦漸長無膿紅腫十數日後出膿者則易治若不出膿中間爛如敗絮棉團者則難治問曰當何以治之答曰初起者以麻涼膏敷之再以熏洗湯熏洗之待膿出盡時以解毒膏貼之俟腐肉落盡方可生肌如氣血盛而脈洪大者可內服中九丸其毒即可漸退而愈昔有一婦人生此瘡無花如饅頭樣紅腫無孔此為腦癰不可以花法治之因經他人敷草藥過多致表皮變硬人皆以無名腫毒治之故多不應余以化肉膏貼之並用針開孔出膿惟此後膿久不幹又用藥線插之方愈二問曰何為對口花對口疽對口疔答曰花者眼多疽者頂平疔者頂尖多癢又問曰三者何以治之答曰名雖不同其治則一頭者經絡之徑路前有口舌相干不可言易先須認清五善七惡治療方有把握如在十餘日間有膿者則易治如不成膿如一包敗絮者則難治治法可內服中九丸外敷麻涼膏再用熏洗之法自易痊愈如有管者當用藥線取之然後再以生肌藥斂口三問曰何為背花答曰背花者其毒極重臟腑皆繫於背故背心生毒要有膿出方為順症爛肉落盡知痛者方好治若初起如粟米大兼有膿頭者不拘老幼即灸艾火十餘壯其毒即出此種病候丸藥取效者多湯劑見效者少患此症者須飲食二便如常有膿周圍沒有烏肉兼知痛癢方為善症治法則一可內服中九丸外用化肉膏化去腐肉自易痊愈四問曰疔毒起於何經答曰起於心經乃極熱惡症發於六腑者易治發於五臟者難治不痛不癢周圍烏黑者難治疔有三十六種外有五種不測之症或食牛羊犬馬或飲酒毒物而生初起不疼不癢或出水或翻花或無頭不作膿如冬瓜皮樣或頭白或烏黑通走九竅眼耳鼻口舌骨里有生膿血由頭面傳於咽喉者必死且疔生二三日必有外徵確候生於頭面者將走黃時咽喉必痛生於手足者將走黃時腋下必有疙瘩其疔之附近亦必有紅線內攻與他瘡殊異凡初起時如粟米大作癢搔之不疼未老先白頭三四日後潮熱寒戰疱硬如疔或是出水或者作疼五六日作紫青色可內服疔毒復生湯銀花生梔骨皮大力木通連翹川軍花粉公英菊花乳香沒藥水煎服外以針刺紅線出血塗以旱煙油再以鮮馬齒莧鮮柏葉明礬雞子清搗爛塗疔訣云治疔先刺血是也如手腳生疔疼痛難忍者以熱香油洗之再以蝦蟆皮貼之又有一種麻子疔者此起彼伏連綿不已是為惡症可用太歲墨內服外敷可以化險為夷疔瘡形象歌初起如粟癢微生未老白頭痛漸增一燒二熱寒戰起三四發疱硬如釘破皮出水疼痛少五朝紅紫六日青人若犯此無膿症先定吉凶辦前程五問曰鬢疽鬢漏耳門癰三者何辨答曰疽者生於鬢毛間狀如癤子平頭起者為癰疼痛非常或遠年不收口者為鬢漏初起者先以太歲墨塗之繼服金蚣丸再服中九丸自愈耳門癰者生於耳門之間三者雖然不同而治法則一相症施治不可拘泥六問曰何為痰核瘰癧答曰痰核僅一二相連瘰癧則重臺子母三五不等或有十餘枚成串者毒痰毒血只有二大原因俱以行痰順氣軟堅開鬱之法治之凡症初起或用海藻昆布螵蛸海帶等藥生效者有之或用斑蝥全蠍等物攻下者有之或有用草藥內服外敷者有之如用此數法均不生效時硬者自以內消為上未穿潰者則用化肉膏敷貼以藥線落子七日見功如浮腫不消者可用金蚣丸中九丸同服紫霞膏亦有奇效更有馬刀癧堅硬如石多在耳前耳後缺盆頰車等處堅而不潰平而不尖赤色如火燒烙極痛難忍急以金蚣中九二丸服之如不生效則無方可治痰核則子午潮燒是為癆病亦多難治七問曰何為項下桃擔肩瘤竄脅癰答曰毒生於顎下者名項下桃生於肩井上者名擔肩瘤生於脅下者為竄脅癰治法無二可照前方選用八問曰何為暗門閂答曰生於耳根下對喉處如門之有閂故曰暗門閂其治法與癰疽同九問曰何為乳癰乳岩乳花答曰乳癰初起紅腫痛甚或六七日成膿或十餘日成膿或因有孕而內吹之或因乳子而外吹之皆為此病根源初起可用蒲公英同酒糟搗敷之或以白頭翁葉同酒糟搗敷之或用馬前子去皮毛香油炸透研末黃酒沖服一分亦可見汗即愈乳岩則因七情氣鬱而成初起形如豆大至四五年時乃漸大如彈子或十餘年方始發作其硬如石潰則狀如山岩故名乳岩治法服金蚣丸中九丸後而生膿者則為可治之症若年久潰而不斂者難治尤忌開刀可令人血出不止倘有五善而無七惡者尚屬可治否則百無一生乳花者狀如背花眼多肉綻治法亦同若三症毒未成膿者俱可用內服仙方活命飲山甲錢半草節錢半防風七分歸尾一錢陳皮七錢銀花二錢乳香一錢沒藥一錢花粉一錢貝母七分白芷梢七錢頭劑用生軍二錢酒煎服二劑則去大黃或神效栝蔞散及連翹金貝散等亦可痊愈十問曰對心漏對心癰何以治之答曰照前癰疽漏瘡竄脅癰等法治之或可獲萬一生望因此屬於絶症也十一問曰何為上肚角下肚角魚口便毒及陰疳鬥精瘡答曰上肚角平臍去臍四指下肚角去前陰上三指胯眼上二指魚口在胯眼其形長便毒同部位其形圓與前諸症同一治法魚口便毒初起用通聖散加蜈蚣去頭足三分清油炙過全蠍去頭尾洗去鹽三分山甲五分炒殭蠶五分炒制乳香五分制沒藥五分此六味共研細末衝入煎藥中服之其毒即下若年遠日久者則不必服此藥可照前法治之陰疳與蠟燭花不同陰疳或破皮或作癢或疼痛或皮爛蠟燭花則必先有一小子或作癢或作疼漸爛開出膿水周圍漸大長成肉球其陰莖則爛而開花治法先用化肉膏化去肉球再用廣錫二錢水銀一錢於鐵勺中熔化攪勻後傾出冷定研為細末與天然散三錢和勻乾摻患處內服中九丸若爛至陰則成鬥精瘡時有如黃油或如肉之物鬥出乃淫精風火濕熱所出可用天然散加輕粉二錢制兒茶一分煆石膏一分制銅緑一分醋煮石青一分共研細末有水則乾摻無水則用公豬膽汁調搽內服中九丸即可漸痊十二問曰卵癀卵癰卵花卵漏何以辨別答曰卵者睪丸也俗名卵子如腫而成膿必要針開卵癰者皮紅腫大毒在皮上卵花者在腫處潰七八眼厥狀如花卵漏者內穿一二眼出清膿黃水日久不幹此皆濕熱下墜膀胱或者酒色過度而成此毒甚有卵子裂破而人不死者亦有因患梅毒其毒未盡而發此症者治法外以紫蘇葉包之並乾摻天然散加赤石脂內服中九丸其餘一切卵症均可照此治法十三問曰附骨疱附骨癰附骨疽附骨漏何以分別答曰毒在胯尖上不紅腫有時而胯上作痛有時而胯下作痛時上時下時好時歹如脛骨樣至於時久而痛在一處皮膚如故按之則疼痛而現形不測此為附骨疽也治法內服中九丸外以化肉膏貼之膿成者則針之附骨疱附骨癰則必先潮熱或乍寒乍熱先則骨肉作疼繼則皮上紅腫而硬亦有因傷寒後而成此毒者名為汗後脫遺痛不可忍治法外以麻涼膏貼敷內服中九丸至於附骨漏者必先因患癰疽疱時久不收口風邪內侵兼之病者求功太急致腐肉未化毒出未盡因之時久成繭成漏膿水不幹治法必須取出多骨化繭去腐後上天然散服中九丸方可痊愈他如汗後脫遺在未穿潰時亦有用蠟醋調陳米粉敷之而愈者十四問曰鶴膝風鶴膝癰人面瘡臁瘡何以別之答曰鶴膝風者膝關節常常疼痛時久後則膝頭腫大如鶴之膝故名鶴膝治法內服止痛藥外用牛皮膠蒸化入生薑汁調和成膏貼之鶴膝癰以紅腫痛者為佳若不紅不腫不痛且不作膿者便不可治若現出頭來終成絶症人面瘡者膝上生一肉瘤如人面樣耳目口鼻畢具患此症者百難一痊治法但以川貝一味研末敷之是否能愈姑盡人事臁瘡者生在臁兒骨上或因外面跌破皮肉受風作癢搔抓而成或因疳毒愈後復發而成或因風熱濕毒未盡驅除而成治法若不癢者以紫霞膏貼之內服中九丸或用輕粉五分生豬板油二兩同新蒸出之饅頭皮共搗塗之亦妙十五問曰裙邊瘡蹭癀踝花鵝掌疔鵝掌風牛皮癬何以別之答曰裙邊瘡婦人多有之因搔抓破皮肌肉潰爛年深日久風濕熱交熾或因腳氣而血脈不行致成此症其瘡大多難治蓋足為諸陰之所會肌肉淺薄氣血難到故治療不能速愈可用紫霞膏或白玉膏貼之兼用熏洗等法一方用好醋二碗入土罐內將白蠟樹葉不拘多少入罐同煮俟煮至一碗時再入輕粉二錢稍煮之後用蠟葉貼之即愈蹭癀生於腳蹭上穿頭出膿者易治如穿頭後日久年深不能收口者難治當以藥線治之踝花生於螺螄骨上有眼出膿須用藥線奪下方好若眼多而七惡有一二見者多不可救鵝掌疔生於腳板心其狀如瘤出水流膿若日久不收口者當用藥線落瘤並去敗物方可生肌鵝掌風系生過楊梅毒瘡服藥過急收毒入內不能發出故發生此瘡可內服中九丸外用桐油搽之兼用黑牛糞燒煙燻之即可痊愈牛皮癬生於頸項及腰腕胯腿之間皆由風熱之毒中於肌膚必用銀針外刺截住以川槿皮磨醋搽之內服中九丸或用煙硫石青生巴豆川槿皮鍋烈搽之無不愈者十六問曰何為痔漏答曰痔生於肛門弦上如榴子樣者為痔有眼孔而出膿水者為漏痔有二十四種名雖不同根源皆為濕熱下注或酒色勞碌所傷而成少年發者極少至四五十歲時發者甚多治法若痔上有眼者以藥線插之其綿管即落外用天然散加赤石脂搽之生肌膏蓋之再加銀翠石青更妙若是血痔可內服中九丸若是通腸痔漏則先用三丫草即牛蒡子草透入腸內然後插入藥線自能漸愈十七問曰口內有蟲疳熱疳走馬牙疳等症何以別之答曰蟲疳者是肉內有蟲逞及傍骨爛出肉如敗絮是也走馬牙疳者口唇俱腫外是好皮內肉腐爛鼻梁俱脫鼻腐爛如柑子皮是也甚則眼耳口鼻俱不可救用醋洗去爛肉見血者十有一二可治治法用鍋烈銅緑天然散各二分藥線末一分半煙硫二釐冰片三釐共和勻撒之內服中九丸此症如爛去皮肉出水出膿者好治如爛來像肝子樣又無膿血者則不可治熱疳則不過牙齦出血洗搽之法俱與上同或以人中白煆過同白頸蚯蚓白砒棗肉燒過研末搽之亦佳十八問曰何為鵝口瘡答曰滿口舌上俱是白皮口內流涎是也治法以黃連乾薑炒蒲黃各等分為末搽之出涎即愈又喉中有暗門閂是為喉癰傍咽舌兩邊有兩個肉瘤如有眼即以藥線插入眼內落瘤吹藥生肌斂口又有牙眶骨上生痰癰堅硬如石發作時牙眶腫脹歪在一邊可用披針開眼上入藥線此為惡症十中難愈一二此症前未詳及故重言之瘰癧瘰癧為瘍科中最難治之一種頑固症候其症之成也往往三五成群牽藤成串故有癧串之稱亦有竄胸竄脅者種種現象不一而足潰後則膿水常流終歲窮年纏綿不愈名雖有五治法則一在初起時可用紫背天葵草服之或以紫花地丁草服之間有愈者如不愈而反擴大時則當以順氣行痰開鬱軟堅之方順氣消痰飲主之方如次石燕一對入鍋炭火煆紅醋淬七次為末陳皮半夏茯苓各五錢廣香三錢海藻海帶昆布各一兩檳榔五錢防風三錢川芎枳實白芷夏枯草各五錢黃連黃芩梔子各一錢赤芍桔梗各三錢或水煎服或成丸服均可或兼服金蚣丸更妙如系男子則加入知母黃柏各八分如系女子則加入當歸地黃川芎白芍各八分如有孕者則忌金蚣丸恐其傷胎此方久服之後消散者有之如不消時則有落核一法內服中九丸兼金蚣丸如未穿頸者以化肉膏貼於頭上俟肉變黑色而不疼痛時用針剝開一孔插入藥線一日一插至七日後核必自行落出凡上藥線當以雞蛋油搽於孔部以減少其疼痛然後以解毒膏掩蓋之用熏洗湯洗淨汙濁後用加味天然散加細藥生肌平口須忌發物免礙藥效加味天然散乳香沒藥兒茶血竭各一錢赤石脂三錢海螵蛸三錢冰片一分如系冬月則加龍骨象皮各三錢上共研細末加入天然散中用之約一月久可愈大藥方能消百毒去腐爛即藥線方白砒三錢明礬七錢先將礬末鋪入鍋內次將砒放在礬中心滴清油五六滴候煙消盡取出聽用如瘡口爛大時用清油白蠟煎溶入大藥在內以油紙敷貼小藥方能縮血干膿水蚊蛤一個開一口灌入明礬末於內用皮紙封固火中燒至內部呈黑色時取起研為細末入生肌散用脫繭風涼膏上大藥後以此方潤繭其核自落煮雞蛋五個去白留黃同麻油久煎去渣傾入碗內加雄黃五錢為末入油內攪勻敷搽患處痰核痰核者其核亦成串三五不等多生於左右二頰下或左右二頦有氣血風痰酒之五種名雖有五而其根則一惟治法當分別虛實不可籠統男子在未患痰核之先原患火症者則為火盛生痰婦人在未患痰核之先先患火症如子午潮燒體質虛弱而後生痰核者即腺癆可照瘰癧方法治之以落其核惜乎十有九皆不可治事前當使病家知道免致醫治不愈時召來譭譽其治療法與瘰癧同服中九丸貼解毒膏落核之後亦以熏洗湯洗之再用加味天然散收功凡寒痰凝結者最忌貼涼膏服涼藥治法服中九丸或陽和湯為妙鬢疔鬢疔生於太陽下左右形一樣頭尖如癤堅硬如石起初頂上如粟米大起白泡或癢或痛色紅者吉紫黑者凶治法內服中九丸兼服千金內托散即十宣散方如下川芎當歸生地各八分赤芍白芷防風各三錢黃耆一錢梔子連翹荊芥白朮黃芩各八分茯苓銀花人參甘草各三分上煎服有膿者可治無膿者難治故可以預決生死外治法或貼麻涼膏或塗太歲墨以止其痛兼用熏洗湯洗之俟六七日後紅色或烏色回弦起白漿泡産膿頭頂上不硬而棉軟飲食如常者是為可治之症若痛不止烏黑如前又不成膿者其症危矣當辨五善七惡以決生死存亡如成膿之症已經潰爛化膿者可以清油黃蠟隔紙膏等貼之隔紙膏方乳香沒藥血竭各一錢輕粉二錢銀硃二錢鉛粉三錢硃砂二錢冰片一分石鐘乳三錢煆過上共為末用清油四兩黃蠟四兩入鍋熔化取起瓷碗貯之候冷定入藥在內攪勻以棉紙攤膏貼於患處一日兩換貼去腐肉後視其肉色如石榴尖樣時用熏洗湯洗淨貼解毒膏摻加味天然散生肌平口鬢疽鬢疽者生在鬢毛之間形同癤子其癢非常大者為癰小者為疽遠年不收口者為漏其患之來也因人素好厚味屢受熱症故成此毒其治法與鬢疔同初起時以太歲墨搽之先服金蚣丸後服中九丸及十宣散外用熏洗生肌平口法只要成膿無不愈者嘴疔似指唇疔而言嘴疔者生嘴上初起時可用艾火灸之癢者須灸至痛痛者須灸至癢其治法與鬢疔同敷搽貼熏服藥無有不愈者水疔水疔不論何部以及四肢皆可發生初起時膚上麻癢手搔之又覺疼痛其色烏紫如疹一發如雷痛不可忍疹處皮肉破爛出水未到七日或七日間爛成深坑日夜呻吟者多屬凶多吉少治法內服中九丸兼服金蚣丸外用太歲墨搽之更以熏洗湯每日熏洗三次痛則停止有膿者可治如無膿而爛至骨者為不治之症耳門癰耳門癰者瘡生耳內其症多由積熱而成一邊硬至耳很紅腫痛甚初起用麻涼膏以止其痛內服中九丸兼服金蚣丸以速散其毒勿使久延釀成大患此症定然成膿治法與鬢疽同內服中九丸兼千金內托散至七日後耳內出膿如膿久不幹者須用線末以綿紙成條黏惹藥末插入耳內連插數次膿干即愈暗門閂症此病生於喉嚨小舌之上左右各有一個肉球塞住喉嚨致水米不下眼多有膿形如爛東瓜狀治法以竹管一枝內貯藥線一條以鐵釬頂住藥線入肉球內一日插入藥線一次連插三日其球即消約六七日間即可痊愈八九至喉嚨不痛能進硬食物時以天然散生肌平口內服中九丸兼服甘桔消痰飲桔梗豆根各一錢梔子連翹防風薄荷甘草各五分黃連七分大力子一錢赤芍白芷川芎各五分玄參麥冬各七分淡竹葉五分水煎服吹藥熊膽三分宮粉一分冰片一分甘石一錢明雄一錢硃砂五分豆根一錢上共為末吹之不過半月即可痊愈以加味天然散收口加味天然散此與前方不同赤石脂煆龍骨海螵蛸冰片兒茶乳香沒藥血竭上共為細末加入天然散中用之功能生肌平口項下桃此症生於腮下結一大核形如胡桃若不受熱善於保重者其核即軟如棉若偶有惱怒時其核即硬大牽連舌根頗類重舌以重舌之方治之又多不效故此症必須取核方有痊愈希望可照前痰核法落核內服中九丸兼金蚣丸其他熏洗生肌平口諸法皆與痰核相同馬刀痰核此症生於下頦對喉嚨處形圓如卵堅硬如石塞住喉嚨女人患者甚多一起惱怒即腫痛潮熱約七八日後即又如常醫治之法以順氣行痰之劑為佳內服中九丸兼金蚣丸切戒針灸不可落核若微針破即血出不止且翻弦而不易收口慎之若子午潮熱又有火症者防成骨癆十難一痊乳花此瘡生於乳頭之上或左右二旁是名乳花亦名乳癰眼孔之多與蜂窩相似治法外用麻涼膏貼之內服中九丸兼托裡之劑至七天之後痛即漸止四圍破皮照前法熏洗生肌平口須忌發物方保無虞或貼隔紙膏亦佳乳癌此症生於乳頭之下其發生時如豆大或如棗核漸漸擴大時可如雞卵其硬如石但不紅腫如受風熱或氣惱時即紅腫而痛經六七日後又復如常不可針破若不慎而針破後即血出不止或弦翻不收病遂危矣治法在初起一二年者服中九丸多次後則漸漸消化或用陽和湯送服中九丸亦可若年久自潰者則百無一生腰疽此症生於左右腰眼下裙帶處皮膚色紅腫硬頭平痛甚在初起時可用艾火灸之痛者灸至癢癢者灸至痛毒即可散縱或不散為害亦少治法與乳花同服中九丸敷洗熏貼生肌平口上肚角疽此症生在臍上約離臍三寸處皮膚不紅不腫肉內隆起一塊按之微痛醫多誤作痰核治之或作奔豚氣治之故皆無效病之來源多因酒色過度後風邪乘虛所致治法以生薑火蔥一握木捶捶爛入鍋炒熱敷於患部冷後又炒又敷以散其風邪內服中九丸兼金蚣丸外敷麻涼膏或兼服排膿敗毒之劑以攻之白朮茯苓當歸川芎炙耆人參各三錢云風白芷黃芩山梔連翹銀花蜈蚣殭蠶全蠍蟬蛻大黃芒硝甘草大棗三枚引上水煎空心服日二次其毒即可不出皮膚如成膿或自潰時其膿即由大便而出再服蠟礬丸干膿收功黃蠟二兩明礬二兩硃砂一兩先將礬砂研細合於一處將黃蠟入鍋熔化後方下礬砂攪勻乘熱為丸如梧子大每服五十丸空心白開水送下至大便膿盡時收功下肚角疽此症生於臍下左右約離臍三寸處有硬塊一條橫過胯眼上下作痛醫者多誤作奔豚或小腸之氣故治鮮有效患此者多由酒色過度後乘熱臥於當風之處使氣遏痰不能周流所致其形狀與上肚角症相似治法亦同惟人體虛弱者當兼服三香丸敷麻涼膏經六七日後皮膚腫起痛甚者可用化肉膏貼之至肉黑時用針撥開膿即隨手出矣若膿不幹者可用藥線三次其膿自干若膿成而不出膚必然內潰而由小便中出以燈心湯送中九丸服之即可痊愈便毒此症在胯眼下有結核初如彈子大漸擴張大至雞卵狀不甚痛初起時服中九丸兼金蚣丸外貼麻涼膏即可內消如不消時可再以五虎下西川法主之蜈蚣全蠍殭蠶蟬蛻山甲當歸赤芍黃芩梔子連翹枳殼銀花防風荊芥生地木通豬苓二醜大黃芒硝黃連白芷甘草上水煎空心服日三次其毒自消如作膿時以上肚角疽之排膿劑服之或在放膿時以化肉膏貼之至穿頭時洗以熏洗湯貼以解毒膏膿盡後用天然散以平口生肌須忌發物魚口此症生於胯間與便毒相似惟便毒圓而魚口長是其不同處潰後則形同魚口故有是名治法亦如便毒敷服熏貼生肌平口山甲三大片炒歸尾三錢大黃三錢殭蠶一錢炒黑醜一錢土木鱉三個甘草節三錢上以酒水各一盅煎至八分時空心服之渣再煎服俟便利四次後食稀粥以補之除黃甲串外九龍丹亦為內消魚口良方過去重慶某醫曾以此方製成魚口內消丸成藥出售獲利不資且有不少同道購作診室常用品其著有療效可知九龍丹木香乳香制沒藥制兒茶血竭另研巴豆去油不去心各等分上研末以生蜜調成一塊瓷器收貯臨用時丸如豌豆大每服一丸空腹時熱酒送服又一本云丸如緑豆大每服九丸故名九龍丹以編者過去經驗一粒似太少九粒又嫌過多大都視患者體質強弱以三丸至七丸為最適當但偶爾也有用到九丸的病勢減退雖快而患者有下利不休副作用是不免過分吃苦耳又文叔來外科摘録中之九龍丹方與此小有不同專治魚口便毒懸癰橫痃初起未成膿者宜服方為兒茶血竭乳香沒藥木香甲珠各一兩共為末以歸尾三兩紅花二兩酒煎膏和丸如梧子大每服二錢空心熱酒送服數服自潰余意便毒既成在未化膿時必須用快刀斬亂麻手段以殺其勢使不化膿今將猛烈峻瀉之巴豆除去似失其制方意義但用歸尾紅花煎膏和丸部分殊屬可取編者臨症上常用家傳之魚口內消丸治便毒效力極為確實穩妥特將其方介紹如次黃柏荊芥防風花粉蟬蛻蒺藜木通槐子山甲斑蝥各等分蜈蚣全蠍黑砂較前藥分量加倍上研末為丸如梧子大每服二十丸熱黃酒送服臁瘡此瘡生於腳連兒骨此處骨多肉少故有窮骨之稱患症多由風濕而來初時發硬搔癢倘偶一不慎失手搔破時則出血水常常不幹且受風后更奇癢難堪往往窮年纍月不能治愈臨症時看其肉色紅活而作痛者易治如烏黑不痛者難治內服中九丸及下列之清解劑若瘡四邊高中間凹者必有繭骨宜搽紅升丹貼隔紙膏防風荊芥蘇合黃芩梔子連翹赤芍各五錢黃柏苦參牛膝木瓜銀花蒼朮花粉白芷木通各三錢上水煎空心服外用熏洗湯熏洗後貼隔紙膏一日一換若四弦好肉作癢者以太歲墨搽於弦上紅腫自退癢即頓止此時可用加味天然散以生肌平口如瘡不紅活而現烏色兼出腥水者宜以除濕追風之劑主之赤芍防風荊芥白芷薄荷紫蘇黃芩黃柏蒺藜蒼朮大黃銀花大楓子蛇床子上銼片以上濃醋一大碗取土罐一隻入藥在內煎一炷香時將桐子葉約百十匹入醋內泡軟冷定取貼瘡上一日一換至瘡口不癢瘡弦紅活時貼膈紙膏洗熏洗湯摻天然散生肌平口裙邊瘡此瘡亦生於連兒骨上女子生者名裙邊瘡男子生者名臁瘡故治法與臁瘡同踝花症此瘡生於踝上故有是名治法與前之乳花相同在初起時可以蒲公英野芋頭各三兩同搗爛用酒糟和勻敷於瘡上乾燥又換頗有痊愈希望蠟燭疳此瘡生於龜頭之上初起時發水泡微癢繼則皮破出水初起時用熏洗湯熏洗之以太歲墨搽之即可痊愈如不幸而擴大時可內服中九丸外貼隔紙膏待痛止後摻加味天然散至肉轉紅活色時即可痊愈若肉不紅而又痛不止者則以後方熏之水銀一錢硃砂一錢麝香半分猩紅一錢響錫一錢上將錫先入小鐵鍋中就炭火上熔化加水銀攪勻俟銀成粉再加百草霜一錢共衆藥研成細末分作三份以安息香三枝浸濕每枝同藥一份用棉紙捲成條共成三條用時每以一條點燃熏入鼻中口含淨水滿口水熱又換愈勤愈佳熏時患者當坐於背風之所勿使風吹煙亂不易入鼻如換水不勤者必有喉牙疼痛之苦即惹起口腔發炎慎之如此日日熏之約六七日即可痊愈下疳此瘡亦生於龜頭上或左或者疼痛非常患部崩裂若不早治而爛至陰根時即十中難獲一痊矣治法與蠟燭疳同內服中九丸洗熏洗湯摻天然散生肌平口鬥精瘡此瘡生於莖中尿管內莖部腫硬延至日久管內排泄白色膿漿小便刺痛醫每誤作淋症治之故屢治無效其瘡之生也多因酒色過度或體弱火旺忍精不泄屢積逆精致成此症治法內服中九丸兼服利水之劑木通滑石瞿麥萹蓄車前炒梔甘草各七分豬苓澤瀉各五分白朮丑牛各六分肉桂三錢通草三錢燈心引上水煎空心服另以熏洗湯濃煎一大碗候水溫時將龜頭入罐中浸之使藥氣通入尿道管內如照新法利用水節將藥水注入尿道中洗之更妙然後取後列小藥插入莖中五倍子一枚開一小孔將明礬末裝入使滿以碗片一塊掩蓋其孔外用藥泥包裹慢火將泥燒乾後再入炭火中燒之至泥發裂起煙時取出冷定去泥將倍礬研末用棉紙捲成條塗以麵糊黏惹藥末於條上陰乾插入莖中一日更換二次不過七八日莖中之患即一掃而去其膿遂亦不生矣然後以加味天然散生肌平口上天然散時亦如前法以麵糊紙條黏惹天然散入莖中使其生肌但不可犯發物並內服中九丸以協助之又一治法系以牡蠣一錢白蓮鬚丹皮棗皮茯苓芡實各一兩澤瀉五錢地黃二兩脾胃不健者可加白朮一兩枳實一兩麥冬一錢共為末煉蜜為丸如梧子大每服七八十丸兼服中九丸三香丸外用下面摻藥黃柏一兩去皮洗淨以豬膽一枚將柏皮烘熱搽豬膽汁又烘又搽然後研為細末備用腦疽此症生於後腦骨上其症狀為患部初時硬起一塊因其不紅不腫遂忽視之及至漸漸腫痛時方始察覺者頗不乏人治法初起時以麻涼膏敷之內服中九丸兼金蚣丸其毒自散如不散時必定成膿可照前面治癧之法治之如穿頭膿水不幹延至日久恐成繭時當以藥線日插三次六七日間其繭則落用熏洗湯洗淨以天然散生肌平口對口瘡此瘡生於後頸窩對喉之處險症也遷延失治足以致死治法先以麻涼膏敷之看其疼痛若何若敷後痛止者是為易治之症內服中九丸並照治癰疔法以清涼之劑敷散之若初起時搔癢皮內黑硬如石一條橫插影響兩耳腫痛日輕夜重久不成膿飲食不思者是犯七惡亦照前治癰疔法施以托裡排膿之劑六七日黑色轉紅四圍起白泡如粟米大小內成膿而腐爛先用熏洗湯洗之次貼隔紙膏至腐肉淨後以加味天然散加雞內金末摻之即愈左肩花症此瘡生於左肩井穴上窩心內治法與前乳花同服中九丸生肌平口右肩花症此瘡與左肩花同治法亦然左右發背症此瘡生於左右飯匙骨上治法與肩花同附骨疽此瘡多生於大胯上有肉之處因患者體厚嗜食煎炒厚味又兼酒色過度招受風濕致痰濕凝滯不行屢積而成其初起時梆骨作脹不甚大痛攻起一塊外面肉色灰白延至期月遂大如斗潮熱頭痛身疼六七日後潮熱不退者其大胯內之梆骨必然作痛醫者每多作風濕痰凝或筋骨疼痛治之故恆不效豈知此乃陰毒之症故痛則日輕夜重治法以火蔥一斤生薑一斤搗爛入鍋炒熱用布包之以尉痛處冷了又換又尉尉後再加石菖蒲二兩入內再炒再尉其毒必出於皮膚而轉紅腫內服中九丸並前方托裡之劑加人參三錢外敷麻涼膏至膿干應指時以化肉膏貼之視肉變黑色時以針撥開瘡頭使膿隨針出若無膿出者再以化肉膏插入孔內再爛一個時辰再用針撥膿必出矣若膿久不幹者可用藥線插入一次以解毒膏貼之常服中九丸解去熱毒方不生變當忌發物鶴膝風此症生於膝眼上兩鬼眼穴內腫起痛如針刺其症之起因大抵由少年時不知保重身體過於酒色斫喪兼受風濕所致治法在初起時可用八法神針針入鬼眼穴內補瀉運氣起針後用艾火灸十餘壯痛即可止內服中九丸兼藥酒酒方如次當歸赤芍川芎白芷防風牛膝木瓜苡仁羌活厚朴蒼朮陳皮荊芥土苓熟地升麻甘草桑寄生石楠藤白蒺藜上共銼成片布袋盛之以好酒十斤放罐內入藥其中罐口用荷葉封住放在火內燒三炷香久冷定取起每日空心飲之儘量而止腫處以棉包里不可受風以常溫暖為佳腳背花此瘡生於腳背不拘左右初起治法與前背花同服中九丸熏洗生肌平口手掌花此瘡生於掌心中治法與疔花相同服中九丸熏洗貼生肌平口耳層此瘡生於耳內初起微癢作腫或外面腫而作膿單方以胭脂水滴入耳內亦有以鱔魚血滴入而生效者吾門治法用棉紙條以漿糊潤濕黏惹線末曬乾後插入耳內一日兩換至七日後膿水自干而愈鼻鼻息此瘡生於兩鼻孔內有一肉瘤掉出鼻孔常時作痛兼出腥臭膿水乃肺經積熱所致也治法宜內服中九丸兼金蚣丸以祛肺熱外用化肉膏貼肉瘤上至肉黑時以針撥開一孔插入藥線三次七日後其瘤自脫用熏洗湯洗後以加味天然散吹入鼻內以生肌再服清肺之劑以清餘毒清肺飲栝蔞仁去油桔梗黃連生地二冬陳皮各七分黃芩梔子連翹赤芍前胡半夏川芎茯苓豬苓木通花粉白芷各五分燈心引又方於七月七日收甜瓜蒂陰乾臨用時以一分研末再用白礬少許棉裹塞鼻牙泄此症牙齦腫痛用水漱口則滿牙齒流血不止故名牙泄治法以止血為主先用側柏葉一握搗自然汁噙之熱了又換數次後以後方搽之青黛三錢食鹽三錢倍子三錢枯礬一錢百草霜錢半真京墨一錢紅褐子灰三錢上共和勻以米泔水漱淨口後將此末搽於牙齦上內服中九丸以解熱毒喉風此症喉嚨腫痛痛不可忍一發如雷乃急病也水米不能下咽生死危在頃刻但亦有延至六七日者治法內服中九丸兼服加減甘桔湯及敗毒散若外面紅腫者以麻涼膏敷之再吹加味冰硼散加減甘桔湯桔梗元參白芷防風赤芍川芎前胡獨活連翹荊芥甘草各五分丑牛豆根黃芩射干生地各五錢竹葉七匹引上水煎食後服加味冰硼散熊膽三分兒茶五分血竭乳香沒藥硼砂寒水石各五錢青黛六錢冰片一錢上共研末吹入喉中使其儘量流出涎水約七日後出膿即愈龍癬瘡此瘡生於胸前兩脅初起作痛如粟成叢肉皮紅腫不敢搔抓有單方四個或可治愈一方以鏡面草為末調水搽之一方用大黃末調水搽之一方用田螺搗爛敷之一方用海金砂末調清油搽之如用以上各方均不效時可內服中九丸兼金蚣丸以解去熱毒外敷麻涼膏疼痛即止如患處已成膿者用隔紙膏貼之後以加味天然散生肌平口龍纏瘡俗名纏腰此瘡生於腰間繫帶之處初起紅腫痛如火燒而不可忍約三日間破皮出水但不成膿乃急症也治法內服中九丸解毒外用青黛敷於患處以止其痛看其所敷之物乾了又換至紅腫消退而不作熱時再以麻涼膏敷之加倍子末一兩於膏內如恐其乾燥可滴入少許清油以調劑之水乾即愈紫癜瘋此瘡或生於手或生於胸色紫而奇癢治法以銅緑煆過五分巴霜五分枯礬二錢白蠟一錢共為細末以核桃油搗爛和勻作一大丸以紙一張裹之火上烘熱搽塗患處以久搽為妙至不奇癢及肉不烏時即告痊愈癭瘤此症有痰氣酒風血等五種之分痰瘤穿潰後如豬腦髓氣瘤浮泡不堅血瘤紅線纏滿酒瘤吃酒時則厚堅不軟不吃酒時則軟而堅風瘤其硬如石受風濕則奇癢難堪只有痰瘤可治其餘四瘤皆為不治之症不可亂動刀針否則翻弦不收其症危矣治法宜以順氣行痰為主藥方如下桔梗茯苓陳皮半夏黃芩梔子防風麥冬白芷赤芍昆布海藻海帶各五錢木香一錢甘草一錢上水煎服並服中九丸金蚣丸若已穿頭者用化肉膏貼之至肉黑後取出腐肉以藥線日插三次約六七日落盡腐肉以加味天然散生肌平口棉子瘡此症多因早年患楊梅毒時服食輕粉汞劑過多欲求速效致後日發生此種粉霜毒氣遍身關節疼痛骨里潮熱氣逆則痰不行遂結成豆子大小之粒漸漸長大皮膚不紅肉內作痛延至日久醫者多以行痰順氣之劑治之屢治不效後遂潰而出水與棉絮相似此刻其痛更甚初不知其為誤服輕粉毒入骨髓之所致也治法內服中九丸兼金蚣丸再加托裡排膿之劑成膿者可治不成膿者難治成膿後用解毒膏貼之插藥線三次俟膿干取出絮團後以熏洗湯洗淨再摻加味天然散收功天泡瘡此症肉皮赤腫發泡痛甚破皮後則排泄清水痛如針刺乃熱極也治法宜內服中九丸金蚣丸兼用清熱解肌湯及黃連解毒湯服至三劑後再加大黃以消利三五次除去邪熱外搽太歲墨止痛候水分幹盡時摻天然散貼解毒膏平口切忌發物清熱解肌湯黃芩八錢大連八錢枳殼梔子連翹荊芥防風花粉陳皮厚朴豬苓澤瀉木通黃柏各五分甘草二錢燈心為引上水煎連服三劑又單方大黃一兩倍子五錢共研細末用雞蛋清調搽患處小兒赤遊丹毒此症因胎中受熱致生此瘡或生兩膝眼上或生腎囊上不定皮膚赤腫破皮後則出血痛甚水洗至何處即爛至何處治方如下鉛粉三錢火煆黃色乳香沒藥血竭黃柏各二兩輕粉三錢冰片一分白蠟二錢上共為細末清油調搽切忌發物又方黃柏三錢豬膽一枚將膽汁搽於黃柏上炙乾又搽又炙數次之後取黃柏為末調搽之小兒腎囊風此症多因濕熱竄入膀胱而成治方如下蒲黃一兩胡連一兩蒼朮一兩上共末以蔥白一握搗爛入藥在內調敷患處又方以千年石灰調好醋搽之亦效痔漏門凡人九竅之中有小肉突出者皆謂之痔故有耳痔鼻痔牙痔等名固不僅肛門一處為然也肛門痔之種類極多名狀亦頗不一故有區分為二十四痔者未破者曰痔已破而成管者曰漏瘻大別之則不外下列數種凡肛門邊生數瘡腫而突出穿破後膿出即散者曰牝痔凡肛門邊突出肉球形同鼠奶而時流膿血者曰牡痔凡腸口顆顆發痛且痛且癢血出淋漓者曰脈痔凡肛門內結核有血或發寒熱每遇大便即脫肛者曰腸痔凡飲酒後即腫痛流血者曰酒痔色痔相同凡每值大便時即血流不止者曰血痔凡肛門腫痛遇怒即發怒息即安者曰氣痔痔瘡種類頗多大致不出以上數種範圍之外其他種種特其變態耳但種別雖多而治法則無大差異內服中九丸以消臟腑之毒熱有時可兼服槐角丸外用化肉膏貼於核上俟肉黑後刮去黑肉一層又以化肉膏貼之如是數次其核自然腐盡洗以熏洗湯摻以加味天然散收功漏症治法內服中九丸以消臟腑之熱併兼服槐角丸以匡其不逮外以三丫草插入孔內以探測其深淺或曲折然後將藥線插入三次外貼解毒膏約六七日後繭落以加味天然散生肌平口茲並將各種不同之痔瘡療法分記如後槐角丸經霜槐角五錢黃連一兩白芷梢防風赤芍枳殼生地各一兩黃芩秦艽黃柏各二兩九製大黃四兩上共為細末米糊為丸如緑豆大空心白湯下如大便有血者可用側柏葉二兩陳棕灰一兩百草霜五錢為丸服之藥線製法硇砂一兩紅砒一兩野芋三兩南星五兩靈仙五兩上先將砒砂另研次將余藥入鍋煎水然後投入砒砂以過江蜘蛛絲一股絲線一股共成一線入藥水中煮一炷香久取出曬乾收貯備用用時以三丫草帶藥線插入孔中隨即穿入肛門內引出三丫草藥線即隨之帶出肛門如法三次纏縛系銅錢一枚於線端每日解開收緊一次名為催線其漏孔遂逐漸裂開得見裡面血肉隨摻天然散如此天天照樣緊之約七日後即可挂穿銅錢亦即落下當用熏洗湯洗淨汙濁貼解毒膏生肌平口收功一羊奶痔此痔內硬頭小根大時作癢痛治法內服中九丸外用化肉膏貼之視肉黑後刮去一層又貼又刮不拘次數必須爛一淺坑痔根方算去盡不致復生此刻即用熏洗湯洗之外貼解毒膏生肌平口二櫻桃痔此痔頭大根小治法以藥線拴三四日其核即自行脫落落後以熏洗湯洗淨摻加味天然散以生肌平口內服中九丸以去熱毒免生變症三雞冠痔此痔形似雞冠硬而赤腫作痛搔破後則出血流水殆因受風熱而成治方如下銅緑五錢乳香沒藥威靈仙寒水石煆各五錢甘石一錢膽礬三錢海螵蛸五錢一方有冰片無螵蛸上為細末以豬膽汁調勻搽之內服中九丸外洗熏洗湯加馬齒莧一大握合煎熏洗之自消四蓮花痔此痔狀如蓮花層層疊起又似雞冠有細孔癢痛而出膿水治法照雞冠痔久熏久洗貼解毒膏摻天然散收功有時痔不軟化必用化肉膏逐層蝕去貼解毒膏摻天然散方可平復五雞管痔此痔亦如通腸漏在未出氣之前先腫痛出膿內有一硬管時出膿水以溫水洗淨用手慢慢托進實為不治之症百中難痊一二治法內服中九丸兼服槐角丸加升麻五錢外以馬齒莧入熏洗湯中久熏久洗間有痊者六脫肛痔此痔因受風寒濕熱致氣虛下降不能上升而成故治法以升提為主方如下當歸一錢白芷梢八分赤芍七分防風五分川芎五錢光連一錢黃芩七分木香一錢另研陳皮枳殼青皮茯苓各七分生地八分升麻一錢皂子七粒甘草一錢上水煎服兼服中九丸外用熏洗湯加倍子一兩明礬一兩合煎熏洗至痔體軟化時再以生血養體之劑培養之並時時以油潤肛門再貼萆麻子餅自上又一單方用上醋一盞於罐內熬滾時將燒紅火磚淬入乘熱熏洗之七曲尺痔此痔生於肛門側邊約一寸處如疽如癤穿頭後時出膿水不幹延至數日後患部即腫起化膿再數月後又有一枚腫起成膿膿水不幹延至穿潰三四孔後內中即結成繭治法內服中九丸兼槐角丸外用藥線插入約三日間落繭以三丫草通開探測之使其迥轉相通共成一處用熏洗湯洗淨摻加味天然散收功八蝴蝶痔此痔與雞冠痔極相似搔癢出水治法亦與雞冠痔同九盤腸痔此痔因氣血虛損濕熱摻入大腸所致發時大腸即墜出約二三寸許其痔核約如棉子大腫痛非常漸漸陰囊俱腫成膿潰頭辛勞即發常常膿水不幹飲食少進治法照前內服托裡排膿之劑外敷麻涼膏以鎮其痛兼服中九金蚣二丸七日後視漏孔出膿時即插干膿小藥線三日後如膿尚不止復以小藥線插之至七日後繭必脫落如此時小便不往龜頭出而往漏孔出者可以黃蠟做成一餅放入孔內再以加味天然散塞住漏孔外貼解毒膏以少飲茶水為佳則小便自少如此補塞數次不過半月每可收功十鎖肛痔此痔生於肛門弦內有痔核數枚鎮住肛門弦上大便時即掉出起身時又縮進或辛勞及酒色過度時即作腫作痛治法待其掉出時洗淨搽藥另以藥線繫於痔根貼以化肉膏兩面夾攻其核必落俟核脫後熏洗以生肌平口十一雌雄漏此漏生於肛門外隔一寸穿一孔左右相對一點不差有時左孔流水而右孔閉有時右孔流水而左孔閉若受辛勞則漏孔出膿治法當外用插入藥線熏洗落繭內服中九丸金蚣丸槐角丸再貼解毒膏收功十二瓜蒂漏亦名瓜藤漏此症先成一漏歷數年後即延至胯上或三五或六七不等初則一孔疼痛出膿繼則牽連多孔出膿故又名瓜藤漏漏孔有一硬痕如牽藤樣治法須先從開始一孔治起依次用線取繭繭盡後以熏洗湯洗之再以加味天然散收功內服中九丸兼槐角丸十三牛鼻漏此漏與曲尺相似形狀如牛之鼻孔故有是名治法與曲尺痔同十四楊梅漏此症生於肛門周圍時出腥水不甚疼痛治法內服中九丸外貼千捶紙其腥水自止十五龜尾漏此症生於龜尾穴骨上下下身一段及背脊骨上皆紅腫作痛潮熱身重或三四日或六七日依舊漏孔出膿甚多治療時於龜尾上紅腫處以手按之必外實內虛有膿應指以化肉膏貼之至肉黑時以針撥開則膿隨針出排出膿後於孔內插藥線三次促其干膿內服中九三香兩丸即瘥干膿小藥線製法用帶圓之五倍子一枚在一端開一孔以明礬五錢白砒一錢為末填入肚內以紙包數層潤濕之後埋入炭灰火中煨之俟其干時取出倍子用火再焙焦為末米麵糊條曬乾備用十三方的總結中九丸純以金石質藥品為主殺菌消炎鎮靜鎮痙收斂腐蝕諸種功能畢具凡陰疽惡毒及陰陽夾雜症之偏於陰者都可使用惟陽性病則不相宜適用於漫腫無頭晝輕夜重皮色不變頑麻木硬等症未成者能消已成者速潰據編者臨床上的應用對瘰癧結核勿論梅毒性結核性疤骨流痰楊梅下疳瘧疾哮喘痔核瘻管等症均有相當療效是祖國極早流行民間的一種化學療法並可用作外用丹藥具有紅升白降三仙滾膿之長有腐者去腐無腐者生新有膿頭者能拔出膿頭汞劑內服照例常要起口腔炎而本方則否靈藥用法各家頗不一致有單用升藥者有單用底藥者有升藥底藥並用者效力似無多大差別編者則單用升藥照理也應當以升藥為是金蚣丸聚諸種有毒蟲類築物為一方功能鎮靜鎮痙解毒消炎凡陽症之紅腫熱痛癰疔大毒發背橫痃大毒及小兒半身以上各種瘡症皆可服用尤以小兒半身以上疙瘩瘡癤等症更為有效因其富有鎮痙作用故又適合於驚癇抽搐麻痹拘攣諸風掉眩手足震顫口眼喎斜角弓反張半身不遂等神經疾患對破傷風的療效有時竟超出玉真散之上編者常於瘰癧潰瘍疤骨流痰患者使其早服金蚣丸晚服中九丸頗收治效二者兼服並可避免中九丸的副作用三香丸是由多種芳香性健胃藥組合而成功能行氣寬中消食健胃除脹鎮嘔止痢塞泄祛痰利水為體質虛弱消化不良的外症患者必需的補助品並可調整中九丸的副作用化肉膏為變相的輕氧化鉀有腐蝕作用今更加入巴豆其腐蝕力遂愈形強大凡腐蝕藥均不免有疼痛故加入靈仙川烏草烏半夏等鎮靜藥藉以麻醉局部緩解疼痛在翻花起弦多骨綿管等場合可去腐生新脫管化綿蓋冥頑不靈的慢性頑瘡非藉此種大刀闊斧的峻劑實不足以收療效也藥線中的砒礬二物是強有力的腐蝕劑亦即三品一條槍的骨幹藥凡瘰癧成繭及癰疽潰後之久不幹膿者皆可用之腐去自然新生惟用時異常疼痛是其弱點編者時常加入蟾酥乳沒合用以緩解患者的痛苦頗如理想又本品與化肉膏有同樣作用紫霞膏能拔毒鎮痛化腐生新舉凡一切頑瘡瘰癧濕瘡梅毒等症均可貼用未成者可以消散已潰流膿久不收口者可以促使迅速收口雖久年臁瘡亦有顯效千捶紙中的砒雄皆具腐蝕作用且能殺螺旋體故對潰爛梅瘡經久不愈膿水不幹者貼之可以化腐生肌斂口乾膿並可用於一切潰後久不收口的慢性瘡症太歲墨是流行祖國若干年代的紫金錠用途廣泛效力宏大在外科門中尤有不少助力代針散是咬頭膏或針頭散的同類物凡皮薄瘡癤內膿已成不得穿頭而畏用刀針者以此敷之約一日間瘡頭即自行穿潰倘皮太厚者須先將瘡頭用三稜針刺開少許然後敷藥方得穿破瘡未化膿時不可使用熏洗湯中藥味有鎮靜鎮痙殺菌消炎祛風除濕諸種作用凡紅腫疼痛的陽性炎症皆可熏洗功能消炎解毒鎮痛是一種具有藥效的水療法天然散的生肌作用最強凡一切外症潰後膿水常流瘡緑髮癢及不斂口的瘡瘍皆可使用功能收水乾膿生肌斂口足敵三仙滾膿方而便利則過之麻涼膏是一種局部麻醉藥凡一切疼痛難忍的瘡毒皆可使用有消腫排膿鎮痛諸作用解毒膏能消炎解毒散結軟堅祛風除濕對於一切陽症瘡瘍都有其相當的作用
